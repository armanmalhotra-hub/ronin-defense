<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <title>Naoya Hida &amp; Co. NH Type 3A Moonphase — silver dial, 18k gold moon (rendering)</title>
  <defs>
    <radialGradient id="hida-dial" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#eef0ee"/>
      <stop offset="100%" stop-color="#c8cac6"/>
    </radialGradient>
    <linearGradient id="hida-case" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0f2f5"/>
      <stop offset="50%" stop-color="#b8bcc4"/>
      <stop offset="100%" stop-color="#7c8089"/>
    </linearGradient>
    <linearGradient id="hida-strap" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d2c4a"/>
      <stop offset="100%" stop-color="#0a1024"/>
    </linearGradient>
    <radialGradient id="moon-gold" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5d27a"/>
      <stop offset="100%" stop-color="#a87a18"/>
    </radialGradient>
    <radialGradient id="moon-sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d2640"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="#f4f1ec"/>

  <!-- alcantara strap (blue) -->
  <path d="M310 60 L490 60 L500 320 L300 320 Z" fill="url(#hida-strap)"/>
  <g stroke="#3a4870" stroke-width="0.7" opacity="0.6">
    <line x1="305" y1="100" x2="495" y2="100"/>
    <line x1="305" y1="160" x2="495" y2="160"/>
    <line x1="305" y1="220" x2="495" y2="220"/>
    <line x1="305" y1="280" x2="495" y2="280"/>
  </g>
  <path d="M300 680 L500 680 L490 940 L310 940 Z" fill="url(#hida-strap)"/>
  <g stroke="#3a4870" stroke-width="0.7" opacity="0.6">
    <line x1="305" y1="720" x2="495" y2="720"/>
    <line x1="305" y1="780" x2="495" y2="780"/>
    <line x1="305" y1="840" x2="495" y2="840"/>
    <line x1="305" y1="900" x2="495" y2="900"/>
  </g>

  <!-- crown (simple style per Hida) -->
  <rect x="660" y="488" width="20" height="24" fill="url(#hida-case)" stroke="#5a5e64" stroke-width="1"/>

  <!-- case (904L stainless, polished + brushed) -->
  <circle cx="400" cy="500" r="280" fill="url(#hida-case)" stroke="#3a3d42" stroke-width="2"/>
  <!-- concave polished bezel -->
  <circle cx="400" cy="500" r="258" fill="#dfe2e7"/>
  <circle cx="400" cy="500" r="240" fill="#1f2125"/>

  <!-- German silver dial, micro-bead-blasted -->
  <circle cx="400" cy="500" r="232" fill="url(#hida-dial)"/>

  <!-- machined brushed minute ring -->
  <circle cx="400" cy="500" r="195" fill="none" stroke="#9ea0a0" stroke-width="1"/>
  <circle cx="400" cy="500" r="178" fill="none" stroke="#9ea0a0" stroke-width="1"/>
  <g stroke="#1a1c1f" stroke-width="0.8">
    <!-- minute ticks every 6 deg, longer every 30 -->
  </g>
  <g transform="translate(400 500)">
    <g id="hida-min-ticks">
      <!-- 60 minute marks via repeated rotation lines -->
    </g>
    <g stroke="#1a1c1f">
      <line x1="0" y1="-195" x2="0" y2="-178" stroke-width="2"/>
      <line x1="0" y1="195"  x2="0" y2="178"  stroke-width="2"/>
      <line x1="-195" y1="0" x2="-178" y2="0" stroke-width="2"/>
      <line x1="195" y1="0"  x2="178" y2="0"  stroke-width="2"/>
      <g stroke-width="1.2">
        <line x1="97" y1="-169" x2="89" y2="-154"/>
        <line x1="169" y1="-97" x2="154" y2="-89"/>
        <line x1="169" y1="97"  x2="154" y2="89"/>
        <line x1="97" y1="169"  x2="89" y2="154"/>
        <line x1="-97" y1="169" x2="-89" y2="154"/>
        <line x1="-169" y1="97" x2="-154" y2="89"/>
        <line x1="-169" y1="-97" x2="-154" y2="-89"/>
        <line x1="-97" y1="-169" x2="-89" y2="-154"/>
      </g>
    </g>
  </g>

  <!-- hand-engraved Roman numerals (cashew-lacquer filled, dark) -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#1a1c1f" text-anchor="middle" font-weight="600">
    <text x="400" y="358">XII</text>
    <text x="544" y="510">III</text>
    <text x="400" y="660">VI</text>
    <text x="258" y="510">IX</text>
    <text x="475" y="375" font-size="16">I</text>
    <text x="525" y="425" font-size="16">II</text>
    <text x="525" y="595" font-size="16">IV</text>
    <text x="475" y="650" font-size="16">V</text>
    <text x="325" y="650" font-size="16">VII</text>
    <text x="278" y="595" font-size="16">VIII</text>
    <text x="278" y="425" font-size="16">X</text>
    <text x="325" y="375" font-size="16">XI</text>
  </g>

  <!-- moonphase aperture at 6 (18k gold disc with stars + smiling moon) -->
  <g transform="translate(400 580)">
    <!-- aperture window -->
    <rect x="-50" y="-22" width="100" height="44" rx="22" ry="22" fill="url(#moon-sky)" stroke="#7c8089" stroke-width="1.2"/>
    <!-- gold moon -->
    <circle cx="0" cy="0" r="18" fill="url(#moon-gold)" stroke="#7a5410" stroke-width="0.6"/>
    <!-- smiling face -->
    <circle cx="-5" cy="-3" r="1.5" fill="#3a2a08"/>
    <circle cx="5" cy="-3" r="1.5" fill="#3a2a08"/>
    <path d="M -6 4 Q 0 9 6 4" stroke="#3a2a08" stroke-width="1" fill="none"/>
    <!-- stars -->
    <g fill="#f5d27a">
      <circle cx="-32" cy="-8" r="0.9"/>
      <circle cx="-26" cy="6" r="0.7"/>
      <circle cx="28" cy="-7" r="0.8"/>
      <circle cx="34" cy="5" r="0.9"/>
      <circle cx="-40" cy="2" r="0.6"/>
      <circle cx="40" cy="-3" r="0.7"/>
    </g>
  </g>

  <!-- blued steel hands -->
  <line x1="400" y1="500" x2="400" y2="335" stroke="#1f3a78" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="500" x2="500" y2="570" stroke="#1f3a78" stroke-width="5" stroke-linecap="round"/>
  <circle cx="400" cy="500" r="5" fill="#1f3a78"/>

  <!-- caption -->
  <g font-family="-apple-system, Helvetica, Arial, sans-serif" fill="#1a1c1f">
    <text x="400" y="985" font-size="16" text-anchor="middle" font-weight="600">Naoya Hida &amp; Co. NH Type 3A Moonphase</text>
    <text x="400" y="80" font-size="11" text-anchor="middle" fill="#888" font-style="italic">illustration · 37mm · German silver · 18k gold moon · blued hands · blue Alcantara</text>
  </g>
</svg>
