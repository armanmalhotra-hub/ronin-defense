<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Watch Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>
  <header>
    <div>
      <h1>Watch Watch</h1>
      <p class="sub">Japanese independents · curated for friends</p>
    </div>
    <div class="who" id="who">
      <input id="nick-input" placeholder="your name" maxlength="24"/>
      <button id="nick-save" title="Save nickname">→</button>
      <button id="lock-toggle" class="lock hidden" title="Unlock" aria-label="Unlock">🔒</button>
      <span class="sync-status" id="sync-status">local</span>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="favorites">Favorites</button>
    <button class="tab" data-tab="drops">Drops</button>
    <button class="tab" data-tab="brands">Brands</button>
    <button class="tab" data-tab="stores">Stores</button>
    <button class="tab" data-tab="cities">Cities</button>
    <button class="tab" data-tab="sellers">Sellers</button>
    <button class="tab" data-tab="friends">Friends</button>
    <input id="search" type="search" placeholder="search…"/>
  </nav>

  <section class="panel" id="panel-favorites">
    <div class="grid" id="grid-favorites"></div>
  </section>

  <section class="panel hidden" id="panel-drops">
    <div class="grid" id="grid-drops"></div>
  </section>

  <section class="panel hidden" id="panel-brands">
    <div class="grid" id="grid-brands"></div>
  </section>

  <section class="panel hidden" id="panel-stores">
    <div class="chip-row" id="store-cities"></div>
    <div class="grid" id="grid-stores"></div>
  </section>

  <section class="panel hidden" id="panel-cities">
    <div class="grid" id="grid-cities"></div>
  </section>

  <section class="panel hidden" id="panel-sellers">
    <div class="grid" id="grid-sellers"></div>
  </section>

  <section class="panel hidden" id="panel-friends">
    <div class="grid" id="grid-friends"></div>
  </section>

  <footer>
    <a href="https://github.com/armanmalhotra-hub/ronin-defense">repo</a>
    <span>·</span>
    <a href="https://github.com/armanmalhotra-hub/ronin-defense/blob/main/dashboard/README.md">readme</a>
    <span>·</span>
    <span id="updated"></span>
  </footer>

  <script src="./config.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
