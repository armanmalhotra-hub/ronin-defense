<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GridGuessr — Daily F1 Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#070707;
    --bg-2:#0e0e0e;
    --card:#141414;
    --card-2:#1a1a1a;
    --line:#252525;
    --line-2:#333;
    --red:#e10600;
    --red-dim:#a00400;
    --red-soft:rgba(225,6,0,0.12);
    --white:#fff;
    --gray:#a8a8a8;
    --gray-2:#777;
    --muted:#555;
    --green:#13c074;
    --green-soft:rgba(19,192,116,0.12);
    --yellow:#f0a800;
    --yellow-soft:rgba(240,168,0,0.12);
  }
  html,body{background:var(--bg);color:var(--white);font-family:'Titillium Web',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:0.005em}
  body{
    min-height:100vh;
    padding:1rem;
    padding-bottom:3rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(225,6,0,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(225,6,0,0.03) 0%, transparent 50%);
  }
  .wrap{width:100%;max-width:520px}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:"tnum"}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0 1rem;margin-bottom:0.5rem}
  .top-icon{width:36px;height:36px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:1rem;border:1px solid var(--line);cursor:pointer}
  .top-icon:hover{border-color:var(--red);color:var(--white)}
  .brand{display:flex;align-items:center;gap:0.5rem;font-weight:900;letter-spacing:0.18em;font-size:0.85rem}
  .brand .chev{color:var(--red);font-weight:900}

  /* PROGRESS */
  .progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;padding:0 0.1rem}
  .progress-label{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--gray);letter-spacing:0.06em}
  .progress-label strong{color:var(--white);font-weight:700}
  .progress-pips{display:flex;gap:5px}
  .pip{width:30px;height:3px;background:var(--line)}
  .pip.done{background:var(--red)}
  .pip.active{background:var(--white)}

  /* MOMENT CARD */
  .moment{
    position:relative;
    border-radius:6px;
    overflow:hidden;
    aspect-ratio:16/10;
    margin-bottom:1rem;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .moment-bg{position:absolute;inset:0}
  .moment-bg.wet{background:linear-gradient(135deg,#0d1830 0%,#1a2a4a 50%,#2c3e60 100%)}
  .moment-bg.dusk{background:linear-gradient(135deg,#1a0d1d 0%,#5a2540 50%,#c25030 100%)}
  .moment-bg.night{background:linear-gradient(135deg,#020412 0%,#0a1530 50%,#1a2858 100%)}
  .moment-bg.sun{background:linear-gradient(135deg,#0a3a78 0%,#2a78c4 60%,#a8d0ee 100%)}
  .moment-bg.heat{background:linear-gradient(135deg,#3a1a05 0%,#a04020 50%,#d8852e 100%)}
  .moment-bg.classic{background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 50%,#404040 100%)}
  .moment-bg.history{background:linear-gradient(135deg,#2a1808 0%,#5a3a18 50%,#8a6230 100%)}
  .moment-bg::after{
    content:"";
    position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(-30deg, transparent 0 22px, rgba(255,255,255,0.025) 22px 23px),
      linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  .moment-bg.has-image{background-size:cover;background-position:center}
  .moment-bg.has-image::after{
    background:linear-gradient(180deg,rgba(0,0,0,0.25) 0%,transparent 30%,transparent 55%,rgba(0,0,0,0.85) 100%);
  }
  .moment-year-bg{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-family:'JetBrains Mono',monospace;
    font-size:11rem;
    font-weight:700;
    color:rgba(255,255,255,0.06);
    letter-spacing:-0.04em;
    pointer-events:none;
    line-height:1;
  }
  .moment-hud{
    position:absolute;inset:0;
    padding:0.95rem 1rem;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    color:#fff;
    z-index:1;
  }
  .moment-top{display:flex;justify-content:space-between;align-items:flex-start}
  .moment-strip{
    display:inline-flex;align-items:center;gap:0.5rem;
    background:rgba(0,0,0,0.55);
    border-left:3px solid var(--red);
    padding:0.32rem 0.65rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    backdrop-filter:blur(6px);
  }
  .moment-strip .yr{color:#fff;font-weight:700}
  .moment-strip .sep{color:var(--gray-2)}
  .moment-strip .lap{color:var(--gray)}
  .moment-tags{display:flex;flex-direction:column;gap:0.3rem;align-items:flex-end}
  .tag{
    display:inline-block;
    font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;
    background:rgba(255,255,255,0.12);
    color:#fff;
    padding:0.25rem 0.55rem;
    font-weight:600;
    backdrop-filter:blur(4px);
  }
  .tag.weather{background:rgba(225,6,0,0.85);color:#fff}
  .moment-desc{
    font-family:'Titillium Web',sans-serif;
    font-size:1rem;
    line-height:1.45;
    font-weight:400;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
    max-width:90%;
  }
  .moment-foot{
    display:flex;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
    color:rgba(255,255,255,0.7);
  }

  /* STEP CARDS */
  .step-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1.1rem;
    margin-bottom:0.9rem;
    position:relative;
    overflow:hidden;
  }
  .step-card.active::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);
  }
  .step-head{display:flex;align-items:center;gap:0.65rem;margin-bottom:0.85rem}
  .step-num{
    width:24px;height:24px;
    background:var(--red);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.78rem;
    flex-shrink:0;
  }
  .step-num.done{background:var(--green)}
  .step-num.locked{background:var(--line-2);color:var(--muted)}
  .step-title{
    font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--white);font-weight:700;
  }
  .step-card.locked .step-title{color:var(--muted)}
  .step-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.04em;
    color:var(--gray-2);margin-top:-0.4rem;margin-bottom:0.7rem;margin-left:2.15rem;
  }
  .step-result{margin-left:auto;display:flex;align-items:center;gap:0.5rem}
  .badge{
    padding:0.2rem 0.55rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;font-weight:700;letter-spacing:0.1em;
    text-transform:uppercase;
  }
  .badge.right{background:var(--green-soft);color:var(--green);border:1px solid rgba(19,192,116,0.3)}
  .badge.close{background:var(--yellow-soft);color:var(--yellow);border:1px solid rgba(240,168,0,0.3)}
  .badge.wrong{background:var(--red-soft);color:var(--red);border:1px solid rgba(225,6,0,0.35)}
  .badge.info{background:rgba(255,255,255,0.05);color:var(--gray-2);border:1px solid var(--line)}

  /* SEARCH */
  .search-wrap{position:relative}
  .search{
    width:100%;
    padding:0.85rem 1rem;
    font-size:0.95rem;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--white);
    outline:none;
    font-family:inherit;
    border-radius:4px;
  }
  .search::placeholder{color:var(--muted)}
  .search:focus{border-color:var(--red);background:#0a0a0a}
  .suggestions{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:var(--card-2);
    border:1px solid var(--line-2);
    max-height:240px;overflow-y:auto;z-index:10;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
    display:none;
    border-radius:4px;
  }
  .suggestions.open{display:block}
  .sugg-item{
    padding:0.6rem 0.85rem;
    font-size:0.88rem;
    cursor:pointer;
    border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
    color:var(--white);
  }
  .sugg-item:last-child{border-bottom:none}
  .sugg-item:hover,.sugg-item.hover{background:rgba(225,6,0,0.08);color:#fff}
  .sugg-meta{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--gray-2);letter-spacing:0.04em}

  .selected-display{
    padding:0.85rem 1rem;
    background:var(--bg-2);
    border:1px solid var(--red);
    border-left-width:3px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:0.95rem;font-weight:600;color:#fff;
    border-radius:4px;
  }
  .selected-display .meta{font-family:'JetBrains Mono',monospace;font-weight:400;color:var(--gray);font-size:0.78rem;margin-left:0.5rem;letter-spacing:0.04em}
  .selected-display .clear{background:none;border:none;color:var(--gray);font-size:1.2rem;cursor:pointer;padding:0;line-height:1}
  .selected-display .clear:hover{color:var(--red)}

  .submit-btn{
    width:100%;padding:0.95rem;
    border:none;background:var(--red);color:#fff;
    font-size:0.85rem;font-weight:700;
    letter-spacing:0.14em;text-transform:uppercase;
    cursor:pointer;margin-top:0.85rem;
    font-family:'Titillium Web',sans-serif;
    transition:background 0.15s;
    border-radius:3px;
  }
  .submit-btn:disabled{background:var(--card-2);color:var(--muted);cursor:not-allowed}
  .submit-btn:not(:disabled):hover{background:#ff1801}
  .submit-btn.dark{background:var(--card-2);border:1px solid var(--line-2)}
  .submit-btn.dark:hover{background:var(--card);border-color:var(--red)}

  .locked-msg{
    padding:0.85rem 1rem;
    background:var(--bg-2);
    border:1px dashed var(--line-2);
    color:var(--muted);
    font-size:0.85rem;text-align:center;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.04em;
    border-radius:4px;
  }

  .answer-block{padding-left:2.15rem}
  .answer-block .ans{font-size:0.98rem;font-weight:700;color:#fff}
  .answer-block .ans-meta{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--gray-2);letter-spacing:0.04em;margin-top:0.15rem}
  .answer-block .your{font-size:0.78rem;color:var(--gray-2);margin-top:0.4rem}
  .answer-block .your.wrong{color:var(--red)}

  /* SCORE PANEL */
  .score-card{
    background:var(--card);
    border:1px solid var(--line);
    padding:1.5rem 1.5rem;
    text-align:center;
    margin-bottom:1rem;
    border-radius:6px;
    position:relative;
    overflow:hidden;
  }
  .score-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);
  }
  .score-card .label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--gray);font-weight:500;margin-bottom:0.4rem;
  }
  .score-card .pct{
    font-family:'JetBrains Mono',monospace;
    font-size:4.2rem;font-weight:700;
    letter-spacing:-0.04em;line-height:1;color:#fff;
  }
  .score-card .pts{
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;color:var(--gray-2);margin-top:0.3rem;letter-spacing:0.04em;
  }
  .split{display:flex;border-top:1px solid var(--line);margin-top:1.1rem;padding-top:1rem}
  .split>div{flex:1;text-align:center}
  .split>div+div{border-left:1px solid var(--line)}
  .split .label{margin-bottom:0.3rem}
  .split .v{font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;color:#fff}

  /* YOUTUBE EMBED inside moment card */
  .moment-video{position:absolute;inset:0;background:#000}
  .moment-video iframe{
    position:absolute;top:50%;left:50%;
    width:130%;height:130%;
    transform:translate(-50%,-50%);
    border:0;pointer-events:none;
  }
  .moment-video-overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0.25) 0%,transparent 30%,transparent 55%,rgba(0,0,0,0.85) 100%);
    pointer-events:none;
  }
  .moment-placeholder-note{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,calc(-50% + 4rem));
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.2em;
    color:rgba(255,255,255,0.35);
    pointer-events:none;
    text-transform:uppercase;
  }

  /* DOSSIER (unified reveal panel) */
  .dossier{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1.1rem 1.1rem 0.9rem;
    margin-bottom:0.9rem;
    position:relative;overflow:hidden;
  }
  .dossier::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--red) 0%,var(--green) 100%);
  }
  .dossier-head{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding-bottom:0.85rem;border-bottom:1px solid var(--line);margin-bottom:0.85rem;
  }
  .dossier-year{
    font-family:'JetBrains Mono',monospace;
    font-size:1.6rem;font-weight:700;color:#fff;line-height:1;
  }
  .dossier-tags{display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:flex-end;max-width:60%}
  .dossier-row{
    display:grid;grid-template-columns:64px 1fr auto;
    align-items:center;gap:0.75rem;padding:0.6rem 0;
    border-bottom:1px solid var(--line);
  }
  .dossier-row:last-of-type{border-bottom:none}
  .dossier-label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--gray-2);font-weight:600;
  }
  .dossier-val{display:flex;flex-direction:column;gap:0.1rem;min-width:0}
  .dossier-name{
    font-size:0.95rem;font-weight:700;color:#fff;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .dossier-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:0.68rem;color:var(--gray-2);
    letter-spacing:0.04em;text-transform:uppercase;
  }
  .dossier-your{
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;letter-spacing:0.06em;
    color:var(--red);padding:0.15rem 0 0.3rem 76px;
    text-transform:uppercase;
  }

  /* CELEBRATION REVEAL */
  .celebration{
    position:relative;
    aspect-ratio:16/10;
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:0.85rem;
    background:linear-gradient(135deg,#1a1a1a 0%,#2a1f0f 50%,#3a2810 100%);
    display:flex;align-items:flex-end;
    padding:1rem;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .celebration::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--green) 0%,#f0a800 100%);
    z-index:2;
  }
  .celebration::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.85) 100%);
    pointer-events:none;
  }
  .celebration.has-gif{background-size:cover;background-position:center}
  .celebration.has-video{background:#000}
  .celebration.has-video iframe{
    position:absolute;top:50%;left:50%;
    width:130%;height:130%;
    transform:translate(-50%,-50%);
    border:0;pointer-events:none;
  }
  .celebration-trophy{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:5rem;opacity:0.18;line-height:1;
    pointer-events:none;
  }
  .celebration-overlay{
    position:relative;z-index:1;color:#fff;
  }
  .winner-name{
    font-family:'Titillium Web',sans-serif;
    font-size:1.5rem;font-weight:900;
    letter-spacing:-0.01em;line-height:1.1;
    text-shadow:0 2px 6px rgba(0,0,0,0.7);
  }
  .winner-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;color:rgba(255,255,255,0.85);
    letter-spacing:0.08em;text-transform:uppercase;
    margin-top:0.25rem;
    text-shadow:0 1px 4px rgba(0,0,0,0.7);
  }

  /* YOUTUBE LINK */
  .yt-link{
    display:flex;align-items:center;justify-content:center;gap:0.5rem;
    width:100%;padding:0.85rem;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--white);
    text-decoration:none;
    font-size:0.78rem;font-weight:700;
    letter-spacing:0.16em;text-transform:uppercase;
    border-radius:3px;margin-bottom:0.85rem;
    transition:border-color 0.15s,background 0.15s;
    font-family:'Titillium Web',sans-serif;
  }
  .yt-link:hover{border-color:var(--red);background:var(--card-2)}
  .yt-link .yt-icon{
    color:#ff0000;font-size:0.85rem;
    background:#fff;width:20px;height:20px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    padding-left:2px;
  }

  .flavor{
    text-align:center;color:var(--gray);
    padding:0.5rem 1rem 1rem;font-size:0.92rem;
    font-style:italic;line-height:1.5;
  }
  .flavor::before{content:"\\\"";color:var(--red);margin-right:0.15rem}
  .flavor::after{content:"\\\"";color:var(--red);margin-left:0.15rem}

  /* START SCREEN */
  .start-card{
    background:var(--card);
    border:1px solid var(--line);
    padding:2.2rem 1.6rem;text-align:center;
    margin-top:2rem;border-radius:8px;
    position:relative;overflow:hidden;
  }
  .start-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--red) 0%,var(--red) 30%,transparent 30%,transparent 35%,var(--red) 35%,var(--red) 38%,transparent 38%,transparent 100%);
  }
  .start-card .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
    color:var(--red);font-weight:700;margin-bottom:0.8rem;
  }
  .start-card h1{
    font-family:'Titillium Web',sans-serif;
    font-size:2.6rem;font-weight:900;
    letter-spacing:-0.02em;margin-bottom:0.6rem;
    color:#fff;line-height:1;
  }
  .start-card .blurb{
    color:var(--gray);font-size:0.95rem;line-height:1.55;
    margin:0 auto 1.6rem;max-width:380px;
  }
  .start-features{
    display:flex;justify-content:center;gap:0;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding:1.2rem 0;margin-bottom:1.5rem;
  }
  .start-feat{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
  .start-feat+.start-feat{border-left:1px solid var(--line)}
  .start-feat .icon{font-size:1.4rem;color:var(--red)}
  .start-feat .label{font-size:0.78rem;color:var(--white);font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
  .start-feat .meta{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--gray-2);letter-spacing:0.06em}
  .start-btn{
    width:100%;padding:1.05rem;
    background:var(--red);color:#fff;
    border:none;font-size:0.9rem;font-weight:700;
    letter-spacing:0.18em;text-transform:uppercase;
    cursor:pointer;font-family:'Titillium Web',sans-serif;
    border-radius:3px;
  }
  .start-btn:hover{background:#ff1801}
  .start-btn-ghost{
    width:100%;padding:0.85rem;
    background:transparent;color:var(--gray);
    border:1px solid var(--line-2);font-size:0.78rem;font-weight:600;
    letter-spacing:0.14em;text-transform:uppercase;
    cursor:pointer;font-family:'Titillium Web',sans-serif;
    border-radius:3px;margin-top:0.55rem;
    transition:border-color 0.15s,color 0.15s;

  .start-meta{margin-top:1rem;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;color:var(--muted)}

  /* SHARE CARD */
  .share-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1.2rem;margin-bottom:1rem;
    text-align:center;position:relative;overflow:hidden;
  }
  .share-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:var(--green);
  }
  .share-label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--gray-2);font-weight:600;margin-bottom:0.7rem;
  }
  .share-grid{
    font-family:'JetBrains Mono',monospace;
    font-size:0.95rem;line-height:1.5;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:0.85rem;
    color:var(--white);
    text-align:left;
    white-space:pre;
    overflow-x:auto;
    margin-bottom:0.8rem;
  }
  .countdown{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;color:var(--gray-2);
    letter-spacing:0.08em;text-transform:uppercase;
    margin-top:0.85rem;
  }

  /* FINAL */
  .round-list{
    background:var(--card);
    border:1px solid var(--line);
    padding:0.4rem 1rem;margin-bottom:1rem;
    border-radius:6px;
  }
  .round-row{

  .round-row:last-child{border-bottom:none}

  .round-row .rt{flex:1;color:var(--gray);font-size:0.82rem}

/* =========================================================
   UTIL — daily seed, deterministic shuffle, persistence
   ========================================================= */
// Mulberry32 — small fast seeded PRNG.
function mulberry32(seed){
  return function(){
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function seededShuffle(arr, seed){
  const rng = mulberry32(seed);
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Today's day number, computed from local midnight.
function todayNumber(){
  const epoch = new Date(EPOCH_ISO + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.floor((today.getTime() - epoch.getTime()) / 86400000) + 1;
}

function selectMomentsForDay(day){
  return seededShuffle(ALL_MOMENTS, day).slice(0, ROUNDS_PER_GAME);
}

function selectRandomMoments(){
  return shuffle(ALL_MOMENTS).slice(0, ROUNDS_PER_GAME);
}

function saveState(){
  if(state.mode !== 'daily') return; // practice mode is ephemeral
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      day: state.day,
      view: state.view,
      roundIdx: state.roundIdx,
      trackPick: state.trackPick,
      teamPick: state.teamPick,
      trackSubmitted: state.trackSubmitted,
      teamSubmitted: state.teamSubmitted,
      scores: state.scores
    }));
  } catch(e){ /* localStorage may be unavailable; fail silently */ }
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(data.day !== todayNumber()) return null; // stale, ignore
    return data;
  } catch(e){ return null; }
}

function clearState(){
  try{ localStorage.removeItem(STORAGE_KEY); } catch(e){}
}

/* ---------------------- ROUND ---------------------- */
function resetRound(){
  state.trackPick = null;
  state.teamPick = null;
  state.trackSubmitted = false;
  state.teamSubmitted = false;
}

function renderRound(){
  const m = state.moments[state.roundIdx];

  const pips = Array.from({length: ROUNDS_PER_GAME}, (_, i) => {
    let cls = 'pip';
    if(i < state.roundIdx) cls += ' done';
    else if(i === state.roundIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  // Visual priority: YouTube video > GIF > mood gradient placeholder.
  // No description text — let the visual do the work (per design).
  const media = MEDIA[m.id] || {};
  let mediaBlock;
  if(media.videoId){
    const params = `autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1&loop=1&playlist=${media.videoId}&start=${media.start||0}${media.end?`&end=${media.end}`:''}`;
    mediaBlock = `
      <div class="moment-video">
        <iframe src="https://www.youtube-nocookie.com/embed/${media.videoId}?${params}"
                frameborder="0"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen></iframe>
        <div class="moment-video-overlay"></div>
      </div>
    `;
  } else if(media.gif){
    mediaBlock = `<div class="moment-bg has-image ${m.mood}" style="background-image:url('${media.gif}')"></div>`;
  } else {
    mediaBlock = `
      <div class="moment-bg ${m.mood}"></div>
      <div class="moment-year-bg">${m.year}</div>
      <div class="moment-placeholder-note">// VIDEO PENDING</div>
    `;
  }

  app.innerHTML = `
    ${renderTopbar()}
    <div class="progress-row">
      <div class="progress-label">ROUND <strong>${state.roundIdx+1}</strong> / ${ROUNDS_PER_GAME}</div>
      <div class="progress-pips">${pips}</div>
    </div>

    <div class="moment">
      ${mediaBlock}
      <div class="moment-hud">
        <div class="moment-top">
          <div class="moment-strip">
            <span class="yr">${m.year}</span>
            <span class="sep">·</span>
            <span class="lap">${m.foot[0]}</span>
          </div>
          <div class="moment-tags">
            ${m.tags.map((t,i)=>`<span class="tag ${i===0 && /wet|night|mixed/i.test(t) ? 'weather' : ''}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="moment-foot">
          <span>${m.foot[1]}</span>
          <span>MOMENT #${state.roundIdx+1}</span>
        </div>
      </div>
    </div>

    <div id="step1"></div>
    <div id="step2"></div>
    <div id="roundResult"></div>
  `;

  renderTrackStep();
  renderTeamStep();
  renderRoundResult();
}

function renderTrackStep(){
  const wrap = document.getElementById('step1');
  if(state.trackSubmitted){
    const m = state.moments[state.roundIdx];
    const pickedTrack = TRACKS.find(t=>t.id===state.trackPick);
    const correctTrack = TRACKS.find(t=>t.id===m.track);
    const correct = state.trackPick === m.track;
    const sameCountry = pickedTrack && correctTrack && pickedTrack.country === correctTrack.country;
    const badgeCls = correct ? 'right' : (sameCountry ? 'close' : 'wrong');
    const badgeLbl = correct ? 'CORRECT' : (sameCountry ? 'RIGHT COUNTRY' : 'INCORRECT');
    // After both submissions, the dossier shows everything; collapse step 1.
    if(state.teamSubmitted){ wrap.innerHTML = ''; return; }
    wrap.innerHTML = `
      <div class="step-card">
        <div class="step-head">
          <div class="step-num done">✓</div>
          <div class="step-title">Track Result</div>
          <div class="step-result"><span class="badge ${badgeCls}">${badgeLbl}</span></div>
        </div>
        <div class="answer-block">
          <div class="ans">${correctTrack.name}</div>
          <div class="ans-meta">${correctTrack.country.toUpperCase()}</div>
          ${!correct ? `<div class="your wrong">YOU PICKED: ${pickedTrack ? pickedTrack.name : '—'}</div>` : ''}
        </div>
      </div>
    `;
    return;
  }
  wrap.innerHTML = `
    <div class="step-card active">
      <div class="step-head">
        <div class="step-num">1</div>
        <div class="step-title">Guess the Track</div>
      </div>
      <div class="step-sub">// where in the world did this happen?</div>
      ${state.trackPick
        ? renderSelected('track', state.trackPick)
        : renderSearch('track', 'Search circuits…')}
      <button class="submit-btn" id="submitTrack" ${state.trackPick?'':'disabled'}>Submit Track →</button>
    </div>
  `;
  bindSearch('track');
  document.getElementById('submitTrack').onclick = submitTrack;
}

function renderTeamStep(){
  const wrap = document.getElementById('step2');
  if(!state.trackSubmitted){
    wrap.innerHTML = `
      <div class="step-card locked">
        <div class="step-head">
          <div class="step-num locked">2</div>
          <div class="step-title">Name the Team</div>
        </div>
        <div class="locked-msg">// SUBMIT TRACK TO UNLOCK</div>
      </div>
    `;
    return;
  }
  // After submission we no longer show a per-step result here; the unified
  // dossier below the score card handles all reveals. Just collapse step 2.
  if(state.teamSubmitted){
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <div class="step-card active">
      <div class="step-head">
        <div class="step-num">2</div>
        <div class="step-title">Name the Team</div>
      </div>

    </div>
  `;
  bindSearch('team');
  document.getElementById('submitTeam').onclick = submitTeam;
}

function renderRoundResult(){
  if(!(state.trackSubmitted && state.teamSubmitted)) return;
  const wrap = document.getElementById('roundResult');
  const m = state.moments[state.roundIdx];
  const media = MEDIA[m.id] || {};
  const sc = state.scores[state.roundIdx];
  const pct = Math.round(sc.total / TOTAL_PER_ROUND * 100);
  const trackPct = Math.round(sc.trackPts / PTS_PER_Q * 100);
  const teamPct = Math.round(sc.teamPts / PTS_PER_Q * 100);
  const isLast = state.roundIdx === state.moments.length - 1;
  const driver = DRIVERS.find(d => d.id === m.driver);
  const track = TRACKS.find(t => t.id === m.track);
  const correctTeam = TEAMS.find(t => t.id === TEAM_BY_MOMENT[m.id]);
  const pickedTrack = TRACKS.find(t => t.id === sc.trackPick);
  const pickedTeam = TEAMS.find(t => t.id === sc.teamPick);
  const trackRight = sc.trackPick === m.track;
  const trackClose = !trackRight && pickedTrack && track && pickedTrack.country === track.country;
  const teamRight = sc.teamPick === (correctTeam && correctTeam.id);

  // Winner reveal: video > gif > trophy placeholder
  let winnerBlock;
  if(media.winnerVideoId){
    const params = `autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1&loop=1&playlist=${media.winnerVideoId}&start=${media.winnerStart||0}${media.winnerEnd?`&end=${media.winnerEnd}`:''}`;
    winnerBlock = `
      <div class="celebration has-video">
        <iframe src="https://www.youtube-nocookie.com/embed/${media.winnerVideoId}?${params}"
                frameborder="0"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen></iframe>
      </div>
    `;
  } else if(media.winnerGif){
    winnerBlock = `<div class="celebration has-gif" style="background-image:url('${media.winnerGif}')"></div>`;
  } else {
    winnerBlock = `<div class="celebration"><div class="celebration-trophy">🏆</div></div>`;
  }

  wrap.innerHTML = `
    <div class="score-card">
      <div class="label">Round ${state.roundIdx+1} Result</div>
      <div class="pct">${pct}%</div>
      <div class="pts">${sc.total.toLocaleString()} / ${TOTAL_PER_ROUND.toLocaleString()} PTS</div>
      <div class="split">
        <div><div class="label">Track</div><div class="v">${trackPct}%</div></div>
        <div><div class="label">Team</div><div class="v">${teamPct}%</div></div>
      </div>
    </div>

    ${winnerBlock}

    <div class="dossier">
      <div class="dossier-head">
        <div class="dossier-year">${m.year}</div>
        <div class="dossier-tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>

      <div class="dossier-row">
        <div class="dossier-label">Track</div>
        <div class="dossier-val">
          <span class="dossier-name">${track.name.split('(')[0].trim()}</span>
          <span class="dossier-meta">${track.country}</span>
        </div>
        <span class="badge ${trackRight ? 'right' : (trackClose ? 'close' : 'wrong')}">${trackRight ? '✓' : (trackClose ? '~' : '✗')}</span>
      </div>
      ${!trackRight ? `<div class="dossier-your">YOU PICKED: ${pickedTrack ? pickedTrack.name.split('(')[0].trim() : '—'}</div>` : ''}

      <div class="dossier-row">
        <div class="dossier-label">Team</div>
        <div class="dossier-val">
          <span class="dossier-name">${correctTeam ? correctTeam.name : '—'}</span>
          <span class="dossier-meta">${correctTeam ? correctTeam.era : ''}</span>
        </div>
        <span class="badge ${teamRight ? 'right' : 'wrong'}">${teamRight ? '✓' : '✗'}</span>
      </div>
      ${!teamRight ? `<div class="dossier-your">YOU PICKED: ${pickedTeam ? pickedTeam.name : '—'}</div>` : ''}

      <div class="dossier-row">
        <div class="dossier-label">Driver</div>
        <div class="dossier-val">
          <span class="dossier-name">${driver.name}</span>
          <span class="dossier-meta">${driver.era}</span>
        </div>
        <span class="badge info">FYI</span>
      </div>
    </div>

    <a class="yt-link" href="${media.youtube}" target="_blank" rel="noopener noreferrer">
      <span class="yt-icon">▶</span> Watch on YouTube
    </a>

    <div class="flavor">${m.flavor}</div>
    <button class="submit-btn dark" id="nextBtn">${isLast ? 'See Final Result →' : 'Next Moment →'}</button>
  `;
  document.getElementById('nextBtn').onclick = nextRound;
  setTimeout(() => wrap.scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

  `;
}

function renderSelected(kind, id){
  const list = kind==='track' ? TRACKS : (kind==='team' ? TEAMS : DRIVERS);
  const item = list.find(x => x.id === id);
  const meta = kind==='track' ? item.country : item.era;
  return `
    <div class="selected-display">
      <div>${item.name}<span class="meta">${meta}</span></div>
      <button class="clear" onclick="clearPick('${kind}')">×</button>
    </div>
  `;
}

function bindSearch(kind){
  const input = document.getElementById(`${kind}Search`);
  if(!input) return;
  const sugg = document.getElementById(`${kind}Suggestions`);
  const list = kind==='track' ? TRACKS : (kind==='team' ? TEAMS : DRIVERS);

  let hoverIdx = -1;
  let filtered = [];

  function update(){
    const q = input.value.trim().toLowerCase();
    filtered = q.length === 0
      ? list.slice(0, 60)
      : list.filter(x => {
          const hay = (x.name + ' ' + (x.country||x.era||'')).toLowerCase();
          return hay.includes(q);
        }).slice(0, 60);
    if(filtered.length === 0){
      sugg.innerHTML = `<div class="sugg-item" style="color:var(--muted);cursor:default">No matches</div>`;
    } else {
      sugg.innerHTML = filtered.map((x,i) => `
        <div class="sugg-item ${i===hoverIdx?'hover':''}" data-id="${x.id}" data-i="${i}">
          <span>${x.name}</span>
          <span class="sugg-meta">${x.country||x.era||''}</span>
        </div>
      `).join('');
      sugg.querySelectorAll('.sugg-item').forEach(el => {
        el.onclick = () => pick(kind, el.dataset.id);
      });
    }
    sugg.classList.add('open');
  }

  input.onfocus = update;
  input.oninput = () => { hoverIdx = -1; update(); };
  input.onkeydown = e => {
    if(e.key === 'ArrowDown'){ e.preventDefault(); hoverIdx = Math.min(filtered.length-1, hoverIdx+1); update(); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); hoverIdx = Math.max(0, hoverIdx-1); update(); }
    else if(e.key === 'Enter' && hoverIdx >= 0 && filtered[hoverIdx]){ e.preventDefault(); pick(kind, filtered[hoverIdx].id); }
    else if(e.key === 'Escape'){ sugg.classList.remove('open'); }
  };
  document.addEventListener('click', e => {
    if(!input.contains(e.target) && !sugg.contains(e.target)) sugg.classList.remove('open');
  });
}

function pick(kind, id){
  if(kind === 'track') state.trackPick = id;
  else state.teamPick = id;
  if(kind === 'track') renderTrackStep(); else renderTeamStep();
}

window.clearPick = function(kind){
  if(kind === 'track') state.trackPick = null;
  else state.teamPick = null;
  if(kind === 'track') renderTrackStep(); else renderTeamStep();
};

/* ---------------------- SUBMIT / SCORING ---------------------- */
function submitTrack(){
  const m = state.moments[state.roundIdx];
  const pickedTrack = TRACKS.find(t=>t.id===state.trackPick);
  const correctTrack = TRACKS.find(t=>t.id===m.track);
  let pts = 0;
  if(state.trackPick === m.track) pts = PTS_PER_Q;
  else if(pickedTrack && correctTrack && pickedTrack.country === correctTrack.country) pts = Math.round(PTS_PER_Q * 0.3);
  state.scores[state.roundIdx] = {
    trackPts: pts,
    teamPts: 0,
    total: pts,
    trackPick: state.trackPick,
    teamPick: null
  };
  state.trackSubmitted = true;
  saveState();
  renderTrackStep();
  renderTeamStep();
}

function submitTeam(){
  const m = state.moments[state.roundIdx];
  const correctTeam = TEAM_BY_MOMENT[m.id];
  let pts = 0;
  if(state.teamPick === correctTeam) pts = PTS_PER_Q;
  const sc = state.scores[state.roundIdx];
  sc.teamPts = pts;
  sc.teamPick = state.teamPick;
  sc.total = sc.trackPts + sc.teamPts;
  state.teamSubmitted = true;
  saveState();
  renderTrackStep();   // collapse step 1
  renderTeamStep();    // collapse step 2
  renderRoundResult(); // show full dossier
}

function nextRound(){
  if(state.roundIdx === state.moments.length - 1){
    state.view = 'final';
    saveState();
    render();
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  state.roundIdx++;
  resetRound();
  saveState();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ---------------------- FINAL ---------------------- */
let countdownTimer = null;

function renderFinal(){
  const totalPts = state.scores.reduce((s,r)=>s+r.total,0);
  const maxPts = state.moments.length * TOTAL_PER_ROUND;
  const pct = Math.round(totalPts/maxPts*100);
  const trackPts = state.scores.reduce((s,r)=>s+r.trackPts,0);
  const teamPts = state.scores.reduce((s,r)=>s+r.teamPts,0);
  const trackPct = Math.round(trackPts / (state.moments.length * PTS_PER_Q) * 100);
  const teamPctTotal = Math.round(teamPts / (state.moments.length * PTS_PER_Q) * 100);

  const verdict = pct >= 90 ? 'Tifosi tier. You watch the practice sessions.'
                : pct >= 70 ? 'Solid garage hand. You know your eras.'
                : pct >= 50 ? 'Casual fan with taste.'
                : pct >= 25 ? 'A few classics in the locker.'
                : 'Welcome to F1. Stick around — the racing’s good.';

  const isDaily = state.mode === 'daily';
  const dayLabel = isDaily ? `Day ${state.day}` : 'Practice';

  app.innerHTML = `
    ${renderTopbar()}
    <div class="score-card">
      <div class="label">${isDaily ? 'Final Result · ' + dayLabel : 'Practice Result'}</div>
      <div class="pct">${pct}%</div>
      <div class="pts">${totalPts.toLocaleString()} / ${maxPts.toLocaleString()} PTS</div>
      <div class="split">
        <div><div class="label">Tracks</div><div class="v">${trackPct}%</div></div>
        <div><div class="label">Teams</div><div class="v">${teamPctTotal}%</div></div>
      </div>
    </div>
    <div class="flavor">${verdict}</div>

    ${isDaily ? `
      <div class="share-card">
        <div class="share-label">Spoiler-free share grid</div>
        <pre class="share-grid" id="shareGrid">${escapeHtml(buildShareText())}</pre>
        <button class="submit-btn" id="shareBtn">📋 Copy Result</button>
        <div class="countdown" id="countdown">Next puzzle in —</div>
      </div>
    ` : `
      <button class="submit-btn" id="playAgain">Play Again →</button>
    `}

    <div class="round-list">
      ${state.scores.map((sc,i)=>{
        const m = state.moments[i];
        const t = TRACKS.find(t=>t.id===m.track);
        const d = DRIVERS.find(d=>d.id===m.driver);
        const team = TEAMS.find(x => x.id === TEAM_BY_MOMENT[m.id]);
        const rpct = Math.round(sc.total/TOTAL_PER_ROUND*100);
        const cls = rpct >= 75 ? 'good' : rpct >= 40 ? 'mid' : 'bad';
        return `
          <div class="round-row">
            <div class="rn">R${i+1} · ${m.year}</div>
            <div class="rt"><strong>${t.name.split('(')[0].trim()}</strong><br><span style="font-size:0.74rem;color:var(--gray-2)">${team ? team.name : '—'} · ${d.name}</span></div>
            <div class="rs ${cls}">${rpct}%</div>
          </div>
        `;
      }).join('')}
    </div>

    ${isDaily ? `<button class="submit-btn dark" id="practiceFromFinal">Play Practice Round →</button>` : ''}
  `;

  if(isDaily){
    const shareBtn = document.getElementById('shareBtn');
    shareBtn.onclick = async () => {
      const text = buildShareText();
      try{
        await navigator.clipboard.writeText(text);
        shareBtn.textContent = '✓ Copied to clipboard';
        setTimeout(() => shareBtn.textContent = '📋 Copy Result', 1800);
      } catch(e){
        // fallback: select the pre block
        const pre = document.getElementById('shareGrid');
        const range = document.createRange();
        range.selectNode(pre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        shareBtn.textContent = 'Selected — press Cmd/Ctrl+C';
      }
    };
    startCountdown();
    const practiceBtn = document.getElementById('practiceFromFinal');
    if(practiceBtn) practiceBtn.onclick = () => {
      state.view = 'round';
      state.mode = 'practice';
      state.day = null;
      state.roundIdx = 0;
      state.scores = [];
      state.moments = selectRandomMoments();
      resetRound();
      render();
      window.scrollTo({top:0});
    };
  } else {
    document.getElementById('playAgain').onclick = () => {
      state.view = 'start';
      state.roundIdx = 0;
      state.scores = [];
      resetRound();
      render();
      window.scrollTo({top:0});
    };
  }
}

function buildShareText(){
  const day = state.day;
  const totalPts = state.scores.reduce((s,r)=>s+r.total,0);
  const maxPts = state.moments.length * TOTAL_PER_ROUND;
  const pct = Math.round(totalPts/maxPts*100);
  const grid = state.scores.map(sc => {
    const trackBlock = sc.trackPts === PTS_PER_Q ? '🟩' : (sc.trackPts > 0 ? '🟨' : '🟥');
    const teamBlock = sc.teamPts === PTS_PER_Q ? '🟩' : '🟥';
    return trackBlock + teamBlock;
  }).join('\n');
  return `GridGuessr · Day ${day}\n${pct}% · ${totalPts}/${maxPts} pts\n\n${grid}\n\n🟩 hit · 🟨 right country · 🟥 miss`;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startCountdown(){
  if(countdownTimer) clearInterval(countdownTimer);
  const el = document.getElementById('countdown');
  if(!el) return;
  const tick = () => {
    const now = new Date();
    const tomorrow = new Date(now);
    tomorrow.setHours(24,0,0,0);
    let diff = Math.max(0, tomorrow - now);
    const h = Math.floor(diff / 3600000); diff -= h*3600000;
    const m = Math.floor(diff / 60000);    diff -= m*60000;
    const s = Math.floor(diff / 1000);
    el.textContent = `Next puzzle in ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

/* ---------------------- BOOT ---------------------- */
function boot(){
  const saved = loadState();
  if(saved){
    // Restore an in-progress or completed daily game.
    state.mode = 'daily';
    state.day = saved.day;
    state.moments = selectMomentsForDay(saved.day);
    state.view = saved.view;
    state.roundIdx = saved.roundIdx || 0;
    state.scores = saved.scores || [];
    state.trackPick = saved.trackPick || null;
    state.teamPick = saved.teamPick || null;
    state.trackSubmitted = !!saved.trackSubmitted;
    state.teamSubmitted = !!saved.teamSubmitted;
  }
  render();
}
boot();
</script>
